{% extends 'base.html' %}
{% from 'form_macros.html' import field_errors %}

{% block content %}
<h1 class="mb-4">Изменить пароль</h1>

<div class="form-panel">
  <form method="post" novalidate>
    <div class="mb-3">
      <label for="old_password" class="form-label">Старый пароль</label>
      <input type="password" class="form-control {% if errors.get('old_password') %}is-invalid{% endif %}" id="old_password" name="old_password">
      {{ field_errors(errors, 'old_password') }}
    </div>
    <div class="mb-3">
      <label for="new_password" class="form-label">Новый пароль</label>
      <input type="password" class="form-control {% if errors.get('new_password') %}is-invalid{% endif %}" id="new_password" name="new_password">
      {{ field_errors(errors, 'new_password') }}
    </div>
    <div class="mb-3">
      <label for="repeat_password" class="form-label">Повторите новый пароль</label>
      <input type="password" class="form-control {% if errors.get('repeat_password') %}is-invalid{% endif %}" id="repeat_password" name="repeat_password">
      {{ field_errors(errors, 'repeat_password') }}
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
  </form>
</div>
{% endblock %}
